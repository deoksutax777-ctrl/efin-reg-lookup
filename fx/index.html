<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환율조회 - 매매기준율 조회</title>
<style>
  :root {
    --main: #00338D;
    --main-dark: #001F5C;
    --main-light: #e7f0ff;
    --gold: #C5A44E;
    --gold-light: #faf3e2;
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #dde3ec;
    --text: #1f2937;
    --muted: #6b7280;
    --warn: #b3261e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Malgun Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--main);
    color: #fff;
    padding: 22px 28px;
    border-bottom: 3px solid var(--gold);
  }
  header h1 {
    margin: 0 0 4px 0;
    font-size: 20px;
    font-weight: 700;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #cfe0ff;
  }
  .site-nav { margin-top: 12px; font-size: 13px; }
  .site-nav a {
    color: #cfe0ff;
    text-decoration: none;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.25);
    margin-right: 8px;
  }
  .site-nav a.active { background: #fff; color: var(--main); font-weight: 700; border-color: #fff; }
  .site-nav a:hover:not(.active) { background: rgba(255,255,255,0.12); }
  main {
    max-width: 720px;
    margin: 24px auto 60px;
    padding: 0 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .meta {
    font-size: 12.5px;
    color: var(--muted);
  }
  .meta b { color: var(--main); }
  label {
    display: block;
    font-weight: 600;
    font-size: 13.5px;
    margin-bottom: 6px;
    color: var(--main);
  }
  .row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .field { flex: 1; min-width: 160px; }
  input[type="date"], input[type="text"], select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, select:focus { outline: 2px solid var(--main); border-color: var(--main); }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .result {
    margin-top: 16px;
    padding: 16px;
    border-radius: 8px;
    background: var(--gold-light);
    border: 1px solid #ecdfbb;
  }
  .result .rate {
    font-size: 28px;
    font-weight: 700;
    color: var(--main);
  }
  .result .rate .unit {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 4px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    margin-top: 8px;
  }
  .badge.fallback { background: var(--gold-light); color: #8a6d1f; border: 1px solid var(--gold); }
  .badge.none { background: #fdecec; color: var(--warn); border: 1px solid #f3c2c0; }
  .calc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .calc-row .field { flex: 1; }
  .calc-row .sep { color: var(--muted); font-weight: 700; padding-top: 20px; }
  .calc-unit {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 4px;
  }
  .disclaimer {
    font-size: 12px;
    color: var(--muted);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin: 30px 0;
  }
</style>
</head>

<header>
  <h1>환율조회 - 일별 매매기준율</h1>
  <p>날짜별 매매기준율 조회 및 외화·원화 환산 도구</p>
  <nav class="site-nav">
    <a href="https://deoksutax777-ctrl.github.io/efin-reg-lookup/">전자금융업·부가통신 조회</a>
    <a href="https://deoksutax777-ctrl.github.io/efin-reg-lookup/fx/" class="active">환율조회</a>
  </nav>
</header>
<main>
  <div class="card">
    <div class="meta" id="meta-info">데이터 로딩 중...</div>
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label for="date-input">조회일자</label>
        <input type="date" id="date-input">
      </div>
      <div class="field">
        <label for="currency-input">통화</label>
        <select id="currency-input"></select>
      </div>
    </div>
    <div class="hint">주말·공휴일 등 고시가 없는 날짜는 직전 영업일 매매기준율을 자동 적용합니다.</div>

    <div class="result" id="result-box">
      <span class="rate" id="rate-value">-</span><span class="unit" id="rate-unit"></span>
      <div id="result-badge"></div>
    </div>
  </div>

  <div class="card">
    <label>기간평균환율 (산술평균)</label>
    <div class="row">
      <div class="field">
        <label for="period-from-input">시작일</label>
        <input type="date" id="period-from-input">
      </div>
      <div class="field">
        <label for="period-to-input">종료일</label>
        <input type="date" id="period-to-input">
      </div>
    </div>
    <div class="hint">해당 기간 영업일(고시일) 매매기준율의 단순 산술평균입니다.</div>

    <div class="result" id="period-result-box">
      <span class="rate" id="period-rate-value">-</span><span class="unit" id="period-rate-unit"></span>
      <div id="period-result-badge"></div>
    </div>
  </div>

  <div class="card">
    <label>외화·원화 환산</label>
    <div class="calc-row">
      <div class="field">
        <input type="text" id="foreign-input" placeholder="0.00">
        <div class="calc-unit" id="foreign-unit-label">USD</div>
      </div>
      <div class="sep">=</div>
      <div class="field">
        <input type="text" id="krw-input" placeholder="0">
        <div class="calc-unit">KRW (원)</div>
      </div>
    </div>
    <div class="disclaimer">
      위 조회일자의 매매기준율을 단순 곱셈·나눗셈한 참고값입니다. 실제 세무신고에 적용할 환율(사업연도 종료일 기준율, 외화환산 방법 등)은 별도로 확인하세요.
    </div>
  </div>
</main>
<footer>제작: Deoksu Tax Firm · 김태현 세무사</footer>

const dateInput = document.getElementById('date-input');
const currencyInput = document.getElementById('currency-input');
const rateValue = document.getElementById('rate-value');
const rateUnit = document.getElementById('rate-unit');
const resultBadge = document.getElementById('result-badge');
const foreignInput = document.getElementById('foreign-input');
const krwInput = document.getElementById('krw-input');
const foreignUnitLabel = document.getElementById('foreign-unit-label');
const metaInfo = document.getElementById('meta-info');
const periodFromInput = document.getElementById('period-from-input');
const periodToInput = document.getElementById('period-to-input');
const periodRateValue = document.getElementById('period-rate-value');
const periodRateUnit = document.getElementById('period-rate-unit');
const periodResultBadge = document.getElementById('period-result-badge');

let currentRate = null;
let isSyncing = false;

function initMeta() {
  metaInfo.innerHTML = `<b>데이터 기준일:</b> ${FX_DATA.asof} 고시분까지 (기간 ${FX_DATA.period_from} ~ ${FX_DATA.period_to}) · 자료: 서울외국환중개 · 이후 갱신분은 원본 엑셀 재반영 필요`;
}

function initCurrencySelect() {
  const codes = Object.keys(FX_DATA.rates);
  currencyInput.innerHTML = codes.map(c => `<option value="${c}">${c}</option>`).join('');
}

function initDate() {
  const dates = Object.keys(FX_DATA.rates[currencyInput.value] || {}).sort();
  dateInput.min = dates[0];
  dateInput.max = FX_DATA.period_to;
  dateInput.value = dates[dates.length - 1];
}

function resolveRate(code, dateStr) {
  const table = FX_DATA.rates[code] || {};
  const dates = Object.keys(table).sort();
  if (!dates.length) return { status: 'none' };
  if (dateStr < dates[0]) return { status: 'none' };
  if (table[dateStr] !== undefined) {
    return { status: 'exact', date: dateStr, rate: table[dateStr] };
  }
  // 직전 영업일 탐색 (최대 10일 역순) — toISOString은 UTC 변환으로 KST에서 하루 밀리므로 로컬 날짜로 조립
  const d = new Date(dateStr + 'T00:00:00');
  for (let i = 1; i <= 10; i++) {
    d.setDate(d.getDate() - 1);
    const cand = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    if (cand < dates[0]) break;
    if (table[cand] !== undefined) {
      return { status: 'fallback', date: cand, requested: dateStr, rate: table[cand] };
    }
  }
  return { status: 'unpublished', requested: dateStr };
}

function fmt(n, digits) {
  return n.toLocaleString('ko-KR', { minimumFractionDigits: digits, maximumFractionDigits: digits });
}

function updateResult() {
  const code = currencyInput.value;
  const dateStr = dateInput.value;
  foreignUnitLabel.textContent = code;
  const r = resolveRate(code, dateStr);

  if (r.status === 'none') {
    currentRate = null;
    rateValue.textContent = '데이터 없음';
    rateUnit.textContent = '';
    resultBadge.innerHTML = `<span class="badge none">스냅샷 범위 밖 (${FX_DATA.period_from} ~ ${FX_DATA.period_to})</span>`;
  } else if (r.status === 'unpublished') {
    currentRate = null;
    rateValue.textContent = '미고시';
    rateUnit.textContent = '';
    resultBadge.innerHTML = `<span class="badge none">아직 고시되지 않은 날짜입니다</span>`;
  } else {
    currentRate = r.rate;
    rateValue.textContent = fmt(r.rate, 2);
    rateUnit.textContent = `원 / 1 ${code}`;
    if (r.status === 'fallback') {
      resultBadge.innerHTML = `<span class="badge fallback">${r.requested} 고시 없음 → 직전 영업일 ${r.date} 기준율 적용</span>`;
    } else {
      resultBadge.innerHTML = '';
    }
  }
  syncFromForeign();
}

function syncFromForeign() {
  if (isSyncing || currentRate === null) return;
  isSyncing = true;
  const v = parseFloat(foreignInput.value.replace(/,/g, ''));
  if (!isNaN(v)) {
    krwInput.value = fmt(Math.round(v * currentRate), 0);
  }
  isSyncing = false;
}

foreignInput.addEventListener('input', () => {
  if (isSyncing || currentRate === null) return;
  isSyncing = true;
  const v = parseFloat(foreignInput.value.replace(/,/g, ''));
  krwInput.value = isNaN(v) ? '' : fmt(Math.round(v * currentRate), 0);
  isSyncing = false;
});

krwInput.addEventListener('input', () => {
  if (isSyncing || currentRate === null) return;
  isSyncing = true;
  const v = parseFloat(krwInput.value.replace(/,/g, ''));
  foreignInput.value = isNaN(v) ? '' : fmt(v / currentRate, 2);
  isSyncing = false;
});

function initPeriod() {
  const dates = Object.keys(FX_DATA.rates[currencyInput.value] || {}).sort();
  periodFromInput.min = periodToInput.min = dates[0];
  periodFromInput.max = periodToInput.max = FX_DATA.period_to;
  if (!periodFromInput.value) periodFromInput.value = dates[0];
  if (!periodToInput.value) periodToInput.value = dates[dates.length - 1];
}

function updatePeriodAverage() {
  const code = currencyInput.value;
  const table = FX_DATA.rates[code] || {};
  const allDates = Object.keys(table).sort();
  const from = periodFromInput.value;
  const to = periodToInput.value;

  if (!from || !to || from > to) {
    periodRateValue.textContent = '-';
    periodRateUnit.textContent = '';
    periodResultBadge.innerHTML = (from && to && from > to)
      ? `<span class="badge none">시작일이 종료일보다 늦습니다</span>` : '';
    return;
  }

  const matched = allDates.filter(d => d >= from && d <= to);
  if (!matched.length) {
    periodRateValue.textContent = '데이터 없음';
    periodRateUnit.textContent = '';
    periodResultBadge.innerHTML = `<span class="badge none">해당 기간에 고시된 환율이 없습니다 (스냅샷 범위: ${allDates[0]} ~ ${allDates[allDates.length - 1]})</span>`;
    return;
  }

  const avg = matched.reduce((s, d) => s + table[d], 0) / matched.length;
  periodRateValue.textContent = fmt(avg, 2);
  periodRateUnit.textContent = `원 / 1 ${code} (${matched.length}영업일 평균)`;

  const outOfSnapshot = from < allDates[0] || to > allDates[allDates.length - 1];
  periodResultBadge.innerHTML = outOfSnapshot
    ? `<span class="badge fallback">요청 범위 중 스냅샷 보유분 ${matched[0]} ~ ${matched[matched.length - 1]}만 반영 (스냅샷 범위: ${allDates[0]} ~ ${allDates[allDates.length - 1]})</span>`
    : '';
}

dateInput.addEventListener('change', updateResult);
currencyInput.addEventListener('change', () => { initDate(); updateResult(); initPeriod(); updatePeriodAverage(); });
periodFromInput.addEventListener('change', updatePeriodAverage);
periodToInput.addEventListener('change', updatePeriodAverage);

initMeta();
initCurrencySelect();
initDate();
updateResult();
initPeriod();
updatePeriodAverage();
</script>
